# The conda-bld step sets the action deploy-type output
#
#   "pre-release" if package version is M.N.P.devX and branch is dev
#   "main" if package version is M.N.P and tag is vM.N.P
#
# The conda package uploads to the corresponding channel label if
# deploy-type == 'pre-release' or 'main' (and this can be relaxed for
# testing). The gh-pages and PyPI package upload if deploy=type ==
# 'main'

name: conda-ci
on: [push]

env:
  PACKAGE_NAME: spudtr  # for conda_upload.sh deploy script
  CONDA_BLD_PATH: /usr/share/miniconda/envs/builder/conda-bld
  SPHINX_DOCS_PATH: $HOME/docs
  SPHIX_DOCS_HTML: $HOME/docs/build/html
  DEPLOY_TYPE: "ci-test"  # default conda channel label

defaults:
  run:
    shell:
      bash -l {0}

jobs:
  conda-ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        py_ver: [3.6, 3.7, 3.8]
    env:
      PY_VER: ${{ matrix.py_ver }}

    outputs:
      # conda clouds gets "main" and "pre-release" uploads.  gh-pages
      # and PyPI get uploads if deploy-type="main". In all cases the
      # version string must be canoncial M.N.P or M.N.P.devX
      deploy-type: ${{ steps.conda-bld.outputs.deploy-type }}
      conda-tarball: ${{ steps.conda-bld.outputs.conda-tarball }}

    steps:

      - uses: actions/checkout@v2

      # v0.2.1 or use release tag as above
      - uses: conda-incubator/setup-miniconda@73b9a8098aade40363e43af145303c23542ccb97
        with:
          python-version: ${{ env.PY_VER }}
          activate-environment: builder

      - name: conda build
        id: conda-bld
        run: |
          export GIT_ABBREV_COMMIT=g${GITHUB_SHA:0:8}
          conda config --set always_yes yes --set changeps1 no
          conda install -q conda-build conda-verify
          conda info -a
          conda build --python=$PY_VER -c defaults -c conda-forge conda
          # TARBALL=`/bin/ls -1 $CONDA_BLD_PATH/linux-64/${PACKAGE_NAME}-*-*.tar.bz2`
          TARBALL=$(conda build conda --output)
          PKG_VERSION=`echo $TARBALL | sed -n "s/.*${PACKAGE_NAME}-\(.\+\)-.*/\1/p"`
          PKG_MNP=`echo $PKG_VERSION | sed -n "s/\(\([0-9]\+\.\)\{1,2\}[0-9]\+\).*/\1/p"`

          # set deploy-type to main or pre-release, this conditions the conda, docs, and PyPI uploads
          if [[ $GITHUB_REF =~ ^refs/heads/dev$ && $PKG_VERSION =~ ^([0-9]+\.){3}dev[0-9]+$ ]]; then DEPLOY_TYPE="pre-release"; fi

          # version M.N.P tagged vM.N.P uploads to conda label main
          if [[ $GITHUB_REF =~ ^refs/tags/v([0-9]+\.){2}[0-9]+$ && $PKG_VERSION == $PKG_MNP ]]; then DEPLOY_TYPE="main"; fi

          # set to condition conda, docs, PyPI uploads
          echo "::set-output name=deploy-type::$DEPLOY_TYPE"
          echo "::set-output name=conda-tarball::$TARBALL"

      - name: install in fresh env
        run: |
          conda create -n env_$PY_VER python=$PY_VER $PACKAGE_NAME -c file://$CONDA_BLD_PATH -c defaults -c conda-forge

      - name: black, pytest, codecov
        run: |
          conda activate env_$PY_VER
          conda install -q black pytest pytest-cov
          conda list
          lscpu
          python -c 'import numpy; numpy.show_config()'
          black --check --verbose .
          pytest --cov=$PACKAGE_NAME 

      - name: convert and upload conda packges
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          TARBALL: ${{ steps.conda-bld.outputs.tarball }}
          # ci-test, pre-release, or main
          CONDA_LABEL: ${{ steps.conda-bld.outputs.deploy-type }}

        # comment out for testing unconditional conda uploads
        if: ${{ steps.conda-bld.outputs.deploy-type == 'main' || steps.conda-bld.outputs.deploy-type == 'pre-release'}}
        run: |
          conda install -q anaconda
          ls -l -R $CONDA_BLD_PATH/linux-64

          conda convert -p osx-64 -p win-64 $TARBALL -o $CONDA_BLD_PATH
          ls -l -R $CONDA_BLD_PATH/**/${PACKAGE_NAME}*.tar.bz2

          # ANACONDA_TOKEN=${ANACONDA_TOKEN:-[not_set]}
          conda_cmd="anaconda --token "$ANACONDA_TOKEN" upload $CONDA_BLD_PATH/**/${PACKAGE_NAME}*.tar.bz2 --label $CONDA_LABEL --skip-existing"
          echo "conda command:" $conda_cmd 
          # if [[ $CONDA_LABEL == "pre-release" || $CONDA_LABEL == "main" ]]; then $conda_cmd; fi
          $conda_cmd

      # deploy docs and PyPI on tagged vM.N.P releases only
      - name: codecov
        if: ${{ matrix.py_ver == '3.8' && steps.conda-bld.outputs.deploy-type == 'ci-test' }}
        run: | 
          conda activate env_$PY_VER
          conda install -q codecov && codecov

      # built here in the active env to nbconvert notebook demos
      - name: make sphinx docs
        if: ${{ matrix.py_ver == '3.8' && steps.conda-bld.outputs.deploy-type == 'ci-test' }}
        run: |
          conda activate env_$PY_VER
          conda install -q sphinx sphinx_rtd_theme jupyter nbsphinx "nbconvert!=5.4" -c defaults -c conda-forge
          conda install -q pandoc -c conda-forge
          make -C docs html
          # touch docs/build/html/.nojekyll  # by default w/ action-gh-pages

      - name: deploy docs to ghpages
        if: ${{ matrix.py_ver == '3.8' && steps.conda-bld.outputs.deploy-type == 'ci-test' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          force_orphan: true
          enable_jekyll: false  # enforce current default
          # TODO destination_dir: ??? ... maybe target pre-release and main docs?

      # https://packaging.python.org/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows
      # - name: pypi-test
      #   uses: pypa/gh-action-pypi-publish@master
      #   with:
      #     password: ${{ secrets.test_pypy_password }}
      #     repository_url: https://test.pypi.org/legacy

