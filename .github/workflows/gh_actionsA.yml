name: gh_actionsA
on: [push]
env:
  PACKAGE_NAME: spudtr  # for conda_upload.sh deploy script
  CONDA_BLD: file:///usr/share/miniconda/envs/builder/conda-bld

defaults:
  run:
    shell:
      bash -l {0}

jobs:
  conda-flow:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyver: ["3.6", "3.7", "3.8"]
    env:
      PY_VER: ${{ matrix.pyver }}
    steps:
      - uses: actions/checkout@v2
      # v2 or SHA for security, v2.0.1 73b9a8098aade40363e43af145303c23542ccb97
      - uses: conda-incubator/setup-miniconda@73b9a8098aade40363e43af145303c23542ccb97
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: builder

      - name: conda setup
        run: |
          conda config --set always_yes yes --set changeps1 no
          conda install -q conda-build conda-verify

      - name: show context info
        run: |
          echo "github_ref" $GITHUB_REF
          conda info -a

      - name: conda build
        run: |
          conda build --python=$PY_VER -c defaults -c conda-forge conda

      - name: conda create env and install
        run: conda create -n pyenv_$PY_VER python=$PY_VER $PACKAGE_NAME -c $CONDA_BLD -c defaults -c conda-forge

      - name: black and pytest
        run: |
          conda activate pyenv_$PY_VER
          conda install -q black pytest pytest-cov
          conda list
          lscpu
          python -c 'import numpy; numpy.show_config()'
          # black --check --verbose .
          # pytest --cov=$PACKAGE_NAME

      - name: conda convert and upload
        run: |
          ls -l -R $CONDA_BLD/linux-64/$PACKAGE_NAME-*.tar.bz2

