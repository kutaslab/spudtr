name: gh_actionsA
on: [push]
env:
  PACKAGE_NAME: spudtr  # for the conda_upload.sh deploy script

defaults:
  run:
    shell:
      bash -l {0}

jobs:
  # 1. 
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyver: ["3.6"] # , "3.7", "3.8"]
    env:
      PY_VER: ${{ matrix.pyver }}
    steps:
      - uses: actions/checkout@v2
      - uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: builder

      - name: set up for conda building
        shell: bash -l {0}
        run: |
          conda config --set always_yes yes --set changeps1 no
          conda info -a
          conda install -q conda-build conda-verify

      - name: build and install package
        shell: bash -l {0}
        run: |
          conda build --python=$PY_VER -c defaults -c conda-forge conda
          conda create -n pyenv_$PY_VER python=$PY_VER $PACKAGE_NAME -c local -c defaults -c conda-forge

      - name: test
        shell: bash -l {0}
        run: |
          conda activate pyenv_$PY_VER
          conda install -q black pytest pytest-cov
          conda list
