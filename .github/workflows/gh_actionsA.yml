name: gh_actionsA
on: [push]
env:
  PACKAGE_NAME: spudtr  # for the conda_upload.sh deploy script

defaults:
  run:
    shell:
      bash -l {0}

jobs:
  # 1. 
  package-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyver: ["3.6", "3.7", "3.8"]
    env:
      PY_VER: ${{ matrix.pyver }}
      CONDA_BLD: file:///usr/share/miniconda/envs/builder/conda-bld
    steps:
      - uses: actions/checkout@v2
      - uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: builder

      - name: set up for conda building
        run: |
          conda config --set always_yes yes --set changeps1 no
          conda info -a
          conda install -q conda-build conda-verify

      - name: build local conda package
        run: |
          conda build --python=$PY_VER -c defaults -c conda-forge conda

      - name: install
        run: |
          conda create -n pyenv_$PY_VER python=$PY_VER $PACKAGE_NAME -c $CONDA_BLD -c defaults -c conda-forge

      - name: test
        run: |
          conda activate pyenv_$PY_VER
          conda install -q black pytest pytest-cov
          conda list
          lscpu
          python -c 'import numpy; numpy.show_config()'
          black --check --verbose .
          pytest --cov=$PACKAGE_NAME
