name: gh_actionsA
on: [push]
env:
  PACKAGE_NAME: spudtr  # for the conda_upload.sh deploy script

defaults:
  run:
    shell:
      bash -l {0}

jobs:
  # 1. 
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyver: ["3.6"] # , "3.7", "3.8"]
    env:
      PY_VER: ${{ matrix.pyver }}
    steps:
      - uses: actions/checkout@v2
      - uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: builder

      - name: setup 
        shell: bash -l {0}
        run: |
          conda config --set always_yes yes --set changeps1 no

      - name: test
        shell: bash -l {0}
        run: |
          conda create -n "pyenv_$PY_VER" "python=$PY_VER" numpy pandas -c defaults -c conda-forge
          conda activate "pyenv_$PY_VER"
          conda list
